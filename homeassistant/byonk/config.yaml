name: Byonk
version: "0.17.0"
slug: byonk
description: Self-hosted content server for TRMNL e-ink devices
url: https://github.com/oetiker/byonk/tree/main/homeassistant/byonk
image: ghcr.io/oetiker/byonk
arch:
  - amd64
  - aarch64
init: true
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: TRMNL device + admin API access (point your device here)
map:
  - addon_config:rw
environment:
  CONFIG_FILE: /config/config.yaml
  SCREENS_DIR: /config/screens
  FONTS_DIR: /config/fonts
  BIND_ADDR: 0.0.0.0:3000
  SCREEN_REPOS_CACHE_DIR: /data/packages
options:
  admin_token: ""
  log_level: info
  auth_mode: api_key
  screen_repo_refresh_interval: 0
  screen_repos: []
schema:
  admin_token: "password?"
  log_level: "list(trace|debug|info|warn|error)"
  auth_mode: "list(api_key|ed25519)"
  screen_repo_refresh_interval: "int(0,)"
  screen_repos:
    - handle: "str"
      repo: "str"
      pin: "str?"
      token: "password?"
